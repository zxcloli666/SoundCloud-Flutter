name: sc_engine
description: Рантайм SoundCloud — фичемодули, DI, темизация, встраиваемый виджет. Реюз десктоп+мобайл.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  sc_visual:
    path: ../visual
  flutter_rust_bridge: 2.12.0
  freezed_annotation: ^3.1.0
  flutter_riverpod: ^3.3.2
  get_it: ^9.2.1
  flutter_staggered_grid_view: ^0.7.0
  url_launcher: ^6.3.2
  lucide_icons_flutter: ^3.1.14+2
  file_picker: ^11.0.2
dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^4.0.0
  freezed: ^3.2.5

flutter:
  assets:
    - assets/i18n/en.json
    - assets/i18n/ru.json
    - assets/i18n/tr.json
    - assets/app-icon.png
