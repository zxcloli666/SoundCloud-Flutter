name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libasound2-dev libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            Core/shared
            Desktop/depens

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.3
          channel: stable
          cache: true

      - name: Build (release)
        working-directory: Desktop/app
        run: |
          flutter pub get
          flutter build linux --release

      - name: Package bundle
        working-directory: Desktop/app/build/linux/x64/release
        run: tar czf "$GITHUB_WORKSPACE/soundcloud-linux-x64.tar.gz" -C bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: soundcloud-linux-x64
          path: soundcloud-linux-x64.tar.gz

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: soundcloud-linux-x64.tar.gz
